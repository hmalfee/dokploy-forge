services:
  beszel-init:
    image: python:3.11-slim
    restart: "no"
    volumes:
      - beszel_data:/beszel_data
    environment:
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@admin.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        pip install -q bcrypt cryptography && python3 - <<'EOF'
        import os, sqlite3, bcrypt, glob, secrets
        from cryptography.hazmat.primitives.asymmetric import ed25519
        from cryptography.hazmat.primitives import serialization

        DIR   = "/beszel_data"
        EMAIL = os.getenv("ADMIN_EMAIL")
        PWD   = os.getenv("ADMIN_PASSWORD")

        # --- SSH keys ---
        key_path, pub_path = f"{DIR}/id_ed25519", f"{DIR}/id_ed25519.pub"
        if not os.path.exists(key_path):
            priv = ed25519.Ed25519PrivateKey.generate()
            open(key_path, "wb").write(priv.private_bytes(
                serialization.Encoding.PEM,
                serialization.PrivateFormat.OpenSSH,
                serialization.NoEncryption()))
            os.chmod(key_path, 0o600)

        if not os.path.exists(pub_path):
            priv = serialization.load_ssh_private_key(open(key_path,"rb").read(), password=None)
            open(pub_path, "wb").write(priv.public_key().public_bytes(
                serialization.Encoding.OpenSSH,
                serialization.PublicFormat.OpenSSH))

        # --- Agent token ---
        token_path = f"{DIR}/agent_token"
        if not os.path.exists(token_path):
            open(token_path, "w").write(secrets.token_hex(32))
        token = open(token_path).read().strip()

        # --- Hub config ---
        open(f"{DIR}/config.yml", "w").write(f"""systems:
          - name: "Local System"
            host: "beszel-agent"
            port: 45876
            token: "{token}"
            users: ["{EMAIL}"]
        """)

        # --- Sync credentials into DB (if exists) ---
        db_paths = glob.glob(f"{DIR}/pb_data/data.db") + glob.glob(f"{DIR}/data.db")
        if not db_paths:
            print("First run: DB not found. Beszel will create it.")
        else:
            db = db_paths[0]
            print(f"Syncing credentials → {db}")
            pw_hash = bcrypt.hashpw(PWD.encode(), bcrypt.gensalt(10)).decode()
            conn = sqlite3.connect(db)
            cur  = conn.cursor()

            cur.execute("SELECT COUNT(*) FROM _superusers")
            if cur.fetchone()[0]:
                cur.execute("UPDATE _superusers SET email=?, password=?", (EMAIL, pw_hash))

            cur.execute("SELECT name FROM sqlite_master WHERE type='table' AND name LIKE '%users%'")
            for (table,) in cur.fetchall():
                cols = {c[1] for c in cur.execute(f"PRAGMA table_info({table})")}
                if {"email","password"} <= cols:
                    updates = {"email": EMAIL, "password": pw_hash}
                    if "tokenKey" in cols:
                        updates["tokenKey"] = secrets.token_hex(32)
                    cur.execute(f"SELECT id FROM {table} LIMIT 1")
                    row = cur.fetchone()
                    if row:
                        sets = ", ".join(f"{k}=?" for k in updates)
                        cur.execute(f"UPDATE {table} SET {sets} WHERE id=?",
                                    (*updates.values(), row[0]))

            conn.commit(); conn.close()
            print("Done.")
        EOF

  beszel:
    image: henrygd/beszel:0.18.7
    restart: unless-stopped
    depends_on:
      beszel-init: { condition: service_completed_successfully }
    volumes:
      - beszel_data:/beszel_data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      USER_EMAIL: ${ADMIN_EMAIL:-admin@admin.com}
      USER_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://127.0.0.1:8090"]
      interval: 10s
      timeout: 3s
      retries: 5

  beszel-agent:
    image: henrygd/beszel-agent:0.18.6
    restart: unless-stopped
    depends_on:
      beszel-init: { condition: service_completed_successfully }
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - beszel_data:/beszel_data:ro
    environment:
      PORT: 45876
      HUB_URL: http://beszel:8090
      KEY_FILE: /beszel_data/id_ed25519.pub
      TOKEN_FILE: /beszel_data/agent_token

volumes:
  beszel_data: {}
