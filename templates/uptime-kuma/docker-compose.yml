# Automatic Docker container monitoring discovery via `container-sync`.
# To ignore a container, add the label `kuma.ignore=true`

services:
  kuma-init:
    image: python:3.12-alpine
    restart: on-failure
    depends_on:
      uptime-kuma:
        condition: service_healthy
    volumes:
      - uptimekuma-data:/app/data
      - ../files/kuma-init.py:/app/scripts/kuma-init.py:ro
    environment:
      KUMA_URL: http://uptime-kuma:3001
      KUMA_USERNAME: ${KUMA_USERNAME:-admin}
      KUMA_PASSWORD: ${KUMA_PASSWORD:-admin1234}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Uptime Kuma}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      SMTP_TO_ADDRESS: ${SMTP_TO_ADDRESS:-}
      PYTHONUNBUFFERED: 1
    command:
      - sh
      - -c
      - |
        pip install uptime-kuma-api-v2 bcrypt --root-user-action=ignore -q
        python -u /app/scripts/kuma-init.py

  container-sync:
    image: python:3.12-alpine
    restart: unless-stopped
    depends_on:
      kuma-init:
        condition: service_completed_successfully
    environment:
      KUMA_URL: http://uptime-kuma:3001
      KUMA_USERNAME: ${KUMA_USERNAME:-admin}
      KUMA_PASSWORD: ${KUMA_PASSWORD:-admin1234}
      PYTHONUNBUFFERED: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - uptimekuma-data:/state
      - ../files/container-sync.py:/app/scripts/container-sync.py:ro
    command:
      - sh
      - -c
      - |
        pip install uptime-kuma-api-v2 docker --root-user-action=ignore -q
        python -u /app/scripts/container-sync.py

  uptime-kuma:
    image: louislam/uptime-kuma:2.2.1
    restart: unless-stopped
    environment:
      UPTIME_KUMA_DB_TYPE: sqlite
    volumes:
      - uptimekuma-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

volumes:
  uptimekuma-data: {}
